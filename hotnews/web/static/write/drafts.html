<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草稿箱 - HotNews</title>
  <script type="module" crossorigin src="/static/write/assets/drafts--OoAQU1z.js"></script>
  <link rel="modulepreload" crossorigin href="/static/write/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/static/write/assets/drafts-Bzuv4cSN.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="page-header">
            <div class="header-left">
                <a href="/" class="back-link" title="返回首页">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="page-title">草稿箱</h1>
            </div>
            <div class="header-right">
                <a href="/write" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    新建文章
                </a>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="page-main">
            <!-- 加载状态 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>

            <!-- 空状态 -->
            <div class="empty-state hidden" id="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <h3>暂无草稿</h3>
                <p>点击右上角「新建文章」开始创作</p>
            </div>

            <!-- 草稿列表 -->
            <div class="draft-list hidden" id="draft-list"></div>

            <!-- 分页 -->
            <div class="pagination hidden" id="pagination">
                <button class="btn btn-secondary" id="btn-prev" disabled>上一页</button>
                <span class="page-info" id="page-info">第 1 页</span>
                <button class="btn btn-secondary" id="btn-next">下一页</button>
            </div>
        </main>

        <!-- 删除确认弹窗 -->
        <div id="delete-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>确认删除</h3>
                    <button class="modal-close" id="btn-close-delete">×</button>
                </div>
                <div class="modal-body">
                    <p>确定要删除这篇草稿吗？此操作不可恢复。</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="btn-cancel-delete">取消</button>
                    <button class="btn btn-danger" id="btn-confirm-delete">删除</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast hidden"></div>
    </div>

</body>
</html>
