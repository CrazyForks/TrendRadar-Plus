<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - HotNews</title>
  <script type="module" crossorigin src="/static/write/assets/main-DaaEBSPJ.js"></script>
  <link rel="modulepreload" crossorigin href="/static/write/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/static/write/assets/main-BzFDBx6Q.css">
</head>
<body>
    <div id="app">
        <!-- 顶部工具栏 -->
        <header class="editor-header">
            <div class="header-left">
                <a href="/" class="back-link" title="返回首页">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <input type="text" id="title" class="title-input" placeholder="请输入标题" maxlength="64">
            </div>
            <div class="header-right">
                <span class="save-status" id="save-status"></span>
                <button id="btn-import-doc" class="btn btn-secondary" title="导入文档">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                    导入
                </button>
                <button id="btn-preview" class="btn btn-secondary">预览</button>
                <button id="btn-drafts" class="btn btn-secondary">草稿箱</button>
                <button id="btn-publish" class="btn btn-primary">发布</button>
            </div>
        </header>

        <!-- 主内容区域（带侧边栏） -->
        <div class="editor-layout">
            <!-- 左侧目录 -->
            <aside class="toc-sidebar" id="toc-sidebar">
                <div class="toc-header">
                    <span class="toc-title">目录</span>
                    <button class="toc-toggle" id="toc-toggle" title="收起目录">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                </div>
                <div class="toc-list" id="toc-list">
                    <div class="toc-empty">暂无目录</div>
                </div>
            </aside>

            <!-- 主编辑区域 -->
            <main class="editor-main">
                <!-- 摘要 -->
                <div class="digest-section">
                    <textarea id="digest" class="digest-input" placeholder="请输入摘要（选填，用于平台展示）" maxlength="200"></textarea>
                <span class="char-count"><span id="digest-count">0</span>/200</span>
            </div>

            <!-- 编辑器工具栏 -->
            <div class="editor-toolbar" id="editor-toolbar">
                <div class="toolbar-group">
                    <button type="button" data-action="bold" title="加粗 (Ctrl+B)">
                        <strong>B</strong>
                    </button>
                    <button type="button" data-action="italic" title="斜体 (Ctrl+I)">
                        <em>I</em>
                    </button>
                    <button type="button" data-action="strike" title="删除线">
                        <s>S</s>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button type="button" data-action="heading1" title="标题1">H1</button>
                    <button type="button" data-action="heading2" title="标题2">H2</button>
                    <button type="button" data-action="heading3" title="标题3">H3</button>
                </div>
                <div class="toolbar-group">
                    <button type="button" data-action="bulletList" title="无序列表">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/>
                            <circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/>
                        </svg>
                    </button>
                    <button type="button" data-action="orderedList" title="有序列表">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/>
                            <text x="4" y="8" font-size="8" fill="currentColor">1</text>
                            <text x="4" y="14" font-size="8" fill="currentColor">2</text>
                            <text x="4" y="20" font-size="8" fill="currentColor">3</text>
                        </svg>
                    </button>
                    <button type="button" data-action="blockquote" title="引用">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/>
                        </svg>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button type="button" data-action="code" title="行内代码">
                        <code>&lt;/&gt;</code>
                    </button>
                    <button type="button" data-action="codeBlock" title="代码块">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/>
                        </svg>
                    </button>
                    <button type="button" data-action="link" title="链接">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                    </button>
                    <button type="button" data-action="image" title="插入图片">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button type="button" data-action="table" title="插入表格">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <line x1="3" y1="15" x2="21" y2="15"/>
                            <line x1="9" y1="3" x2="9" y2="21"/>
                            <line x1="15" y1="3" x2="15" y2="21"/>
                        </svg>
                    </button>
                    <button type="button" data-action="highlight" title="高亮">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button type="button" data-action="alignLeft" title="左对齐">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/>
                        </svg>
                    </button>
                    <button type="button" data-action="alignCenter" title="居中">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
                        </svg>
                    </button>
                    <button type="button" data-action="alignRight" title="右对齐">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="toolbar-group">
                    <button type="button" data-action="undo" title="撤销 (Ctrl+Z)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                        </svg>
                    </button>
                    <button type="button" data-action="redo" title="重做 (Ctrl+Y)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tiptap 编辑器容器 -->
            <div id="editor" class="editor-content"></div>
            
            <!-- 封面上传（编辑器下方） -->
            <div class="cover-section">
                <div class="cover-preview" id="cover-preview">
                    <div class="cover-placeholder" id="cover-placeholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <span>添加封面图</span>
                    </div>
                    <img id="cover-image" class="cover-image hidden" alt="封面">
                    <button id="btn-remove-cover" class="btn-remove-cover hidden" title="移除封面">×</button>
                </div>
                <input type="file" id="cover-input" accept="image/*" hidden>
            </div>
            
            <!-- BubbleMenu 浮动工具栏 -->
            <div id="bubble-menu" class="bubble-menu">
                <button type="button" data-action="bold" title="加粗"><strong>B</strong></button>
                <button type="button" data-action="italic" title="斜体"><em>I</em></button>
                <button type="button" data-action="strike" title="删除线"><s>S</s></button>
                <button type="button" data-action="highlight" title="高亮">🖍</button>
                <button type="button" data-action="link" title="链接">🔗</button>
                <span class="bubble-divider"></span>
                <button type="button" data-action="ai-rewrite" title="AI 改写">✏️</button>
                <button type="button" data-action="ai-expand" title="AI 扩写">📝</button>
                <button type="button" data-action="ai-image" title="生成配图">🎨</button>
            </div>
            
            <!-- 图片上传 input -->
            <input type="file" id="image-input" accept="image/*" hidden>
            

        </main>
        </div><!-- 关闭 editor-layout -->

        <!-- 预览弹窗 -->
        <div id="preview-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content preview-modal-content">
                <div class="modal-header">
                    <h3>文章预览</h3>
                    <button class="modal-close" id="btn-close-preview">×</button>
                </div>
                <div class="modal-body preview-body">
                    <article class="preview-article">
                        <h1 class="preview-title" id="preview-title"></h1>
                        <p class="preview-digest" id="preview-digest"></p>
                        <img class="preview-cover hidden" id="preview-cover" alt="封面">
                        <div class="preview-content" id="preview-content"></div>
                    </article>
                </div>
            </div>
        </div>

        <!-- 发布确认弹窗 -->
        <div id="publish-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>确认发布</h3>
                    <button class="modal-close" id="btn-close-modal">×</button>
                </div>
                <div class="modal-body">
                    <p class="publish-confirm-text">确定要发布这篇文章吗？</p>
                    <div class="publish-preview">
                        <div class="publish-preview-title" id="publish-preview-title"></div>
                        <div class="publish-preview-digest" id="publish-preview-digest"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="btn-cancel-publish">取消</button>
                    <button class="btn btn-primary" id="btn-confirm-publish">确认发布</button>
                </div>
            </div>
        </div>

        <!-- 封面裁剪弹窗 -->
        <div id="crop-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content crop-modal-content">
                <div class="modal-header">
                    <h3>裁剪封面</h3>
                    <button class="modal-close" id="btn-close-crop">×</button>
                </div>
                <div class="modal-body crop-body">
                    <div class="crop-container">
                        <img id="crop-image" alt="裁剪预览">
                    </div>
                    <p class="crop-hint">拖动调整裁剪区域，推荐比例 2.35:1（微信公众号封面）</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="btn-cancel-crop">取消</button>
                    <button class="btn btn-primary" id="btn-confirm-crop">确定</button>
                </div>
            </div>
        </div>

        <!-- 文档导入弹窗 -->
        <div id="import-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content import-modal-content">
                <div class="modal-header">
                    <h3>导入文档</h3>
                    <button class="modal-close" id="btn-close-import">×</button>
                </div>
                <div class="modal-body">
                    <div class="import-dropzone" id="import-dropzone">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <line x1="9" y1="15" x2="15" y2="15"/>
                        </svg>
                        <p class="dropzone-text">拖拽文件到这里，或点击选择文件</p>
                        <p class="dropzone-hint">支持 Markdown (.md)、PDF (.pdf)、Word (.docx)</p>
                    </div>
                    <div class="import-progress hidden" id="import-progress">
                        <span class="loading-spinner"></span>
                        <span>正在解析文档...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 文档上传 input -->
        <input type="file" id="doc-input" accept=".md,.markdown,.pdf,.docx" hidden>

        <!-- Toast 提示 -->
        <div id="toast" class="toast hidden"></div>
    </div>

</body>
</html>
