<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>绑定邮箱 - Hotnews</title>
    <link rel="icon" href="/static/images/hxlogo.jpg" type="image/jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .bind-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .bind-logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .bind-logo img {
            width: 56px;
            height: 56px;
            border-radius: 12px;
        }
        .bind-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .bind-desc {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-input:focus {
            border-color: #667eea;
            background: #fff;
        }
        .code-row {
            display: flex;
            gap: 10px;
        }
        .code-row .form-input {
            flex: 1;
            letter-spacing: 4px;
            font-size: 18px;
            text-align: center;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-send {
            background: #f0f0f0;
            color: #333;
            white-space: nowrap;
            min-width: 110px;
        }
        .btn-send:hover:not(:disabled) {
            background: #e0e0e0;
        }
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 16px;
            padding: 14px;
            margin-top: 6px;
        }
        .btn-primary:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .msg {
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }
        .msg-error { color: #e53e3e; }
        .msg-success { color: #38a169; }
        .skip-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
            text-decoration: none;
        }
        .skip-link:hover { color: #888; }
        .success-view {
            text-align: center;
            display: none;
        }
        .success-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .success-text {
            font-size: 18px;
            font-weight: 500;
            color: #38a169;
            margin-bottom: 8px;
        }
        .success-sub {
            font-size: 14px;
            color: #888;
        }
        @media (max-width: 480px) {
            .bind-card { padding: 32px 24px; }
            .bind-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="bind-card">
        <!-- Form View -->
        <div id="formView">
            <div class="bind-logo">
                <img src="/static/images/hxlogo.jpg" alt="Hotnews">
            </div>
            <div class="bind-title">绑定邮箱</div>
            <div class="bind-desc">微信登录成功！请绑定邮箱以完善账号信息，<br>方便后续找回密码和接收通知。</div>

            <div class="form-group">
                <label class="form-label">邮箱地址</label>
                <input type="email" id="emailInput" class="form-input" placeholder="请输入邮箱地址" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label">验证码</label>
                <div class="code-row">
                    <input type="text" id="codeInput" class="form-input" placeholder="------" maxlength="6" inputmode="numeric">
                    <button class="btn btn-send" id="sendBtn" onclick="sendCode()">发送验证码</button>
                </div>
            </div>

            <button class="btn btn-primary" id="bindBtn" onclick="bindEmail()">确认绑定</button>

            <div class="msg" id="msgArea"></div>
            <a href="/" class="skip-link">稍后再说，先逛逛 →</a>
        </div>

        <!-- Success View -->
        <div class="success-view" id="successView">
            <div class="success-icon">✅</div>
            <div class="success-text">邮箱绑定成功</div>
            <div class="success-sub">正在跳转...</div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const codeInput = document.getElementById('codeInput');
        const sendBtn = document.getElementById('sendBtn');
        const bindBtn = document.getElementById('bindBtn');
        const msgArea = document.getElementById('msgArea');
        let countdown = 0;

        function showMsg(text, isError) {
            msgArea.textContent = text;
            msgArea.className = 'msg ' + (isError ? 'msg-error' : 'msg-success');
        }

        function startCountdown() {
            countdown = 60;
            sendBtn.disabled = true;
            const tick = () => {
                if (countdown <= 0) {
                    sendBtn.textContent = '重新发送';
                    sendBtn.disabled = false;
                    return;
                }
                sendBtn.textContent = countdown + 's';
                countdown--;
                setTimeout(tick, 1000);
            };
            tick();
        }

        async function sendCode() {
            const email = emailInput.value.trim();
            if (!email || !email.includes('@')) {
                showMsg('请输入有效的邮箱地址', true);
                return;
            }

            sendBtn.disabled = true;
            showMsg('', false);

            try {
                const resp = await fetch('/api/auth/bind-email/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await resp.json();

                if (resp.ok && data.ok) {
                    showMsg('验证码已发送，请查看邮箱', false);
                    startCountdown();
                    codeInput.focus();
                } else {
                    showMsg(data.detail || data.message || '发送失败', true);
                    sendBtn.disabled = false;
                }
            } catch (e) {
                showMsg('网络错误，请重试', true);
                sendBtn.disabled = false;
            }
        }

        async function bindEmail() {
            const email = emailInput.value.trim();
            const code = codeInput.value.trim();

            if (!email || !email.includes('@')) {
                showMsg('请输入有效的邮箱地址', true);
                return;
            }
            if (!code || code.length < 4) {
                showMsg('请输入验证码', true);
                return;
            }

            bindBtn.disabled = true;
            bindBtn.textContent = '绑定中...';
            showMsg('', false);

            try {
                const resp = await fetch('/api/auth/bind-email/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code }),
                });
                const data = await resp.json();

                if (resp.ok && data.ok) {
                    document.getElementById('formView').style.display = 'none';
                    document.getElementById('successView').style.display = 'block';
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                } else {
                    showMsg(data.detail || data.message || '绑定失败', true);
                    bindBtn.disabled = false;
                    bindBtn.textContent = '确认绑定';
                }
            } catch (e) {
                showMsg('网络错误，请重试', true);
                bindBtn.disabled = false;
                bindBtn.textContent = '确认绑定';
            }
        }

        // Enter key support
        emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendCode(); });
        codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') bindEmail(); });
    </script>
</body>
</html>
