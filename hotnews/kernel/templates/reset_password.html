<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - HotNews</title>
    <style>
        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --bg: #0F172A;
            --card-bg: #1E293B;
            --text: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
            --error: #EF4444;
            --success: #22C55E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .back-link {
            display: block;
            text-align: center;
            color: var(--primary);
            font-size: 14px;
            margin-top: 20px;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .invalid-token {
            text-align: center;
            padding: 40px 20px;
        }

        .invalid-token .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .invalid-token h2 {
            margin-bottom: 12px;
            color: var(--error);
        }

        .invalid-token p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>🔥 HotNews</h1>
                <p>重置您的密码</p>
            </div>

            <div id="reset-form-container">
                <div id="message" class="message"></div>

                <form id="reset-form" onsubmit="handleReset(event)">
                    <div class="form-group">
                        <label>新密码</label>
                        <input type="password" id="new-password" placeholder="至少6位" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="confirm-password" placeholder="再次输入密码" required minlength="6">
                    </div>
                    <button type="submit" class="submit-btn" id="reset-btn">重置密码</button>
                </form>

                <a href="/api/auth/page" class="back-link">返回登录</a>
            </div>

            <div id="invalid-token-container" class="invalid-token" style="display: none;">
                <div class="icon">⚠️</div>
                <h2>链接无效或已过期</h2>
                <p>请重新申请密码重置</p>
                <a href="/api/auth/page" class="submit-btn" style="display: inline-block; text-decoration: none;">返回登录</a>
            </div>

            <div id="success-container" style="display: none; text-align: center; padding: 20px 0;">
                <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
                <h2 style="margin-bottom: 12px;">密码重置成功</h2>
                <p style="color: var(--text-muted); margin-bottom: 24px;">您现在可以使用新密码登录</p>
                <a href="/api/auth/page" class="submit-btn" style="display: inline-block; text-decoration: none;">去登录</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('reset-form-container').style.display = 'none';
            document.getElementById('invalid-token-container').style.display = 'block';
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        async function handleReset(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            btn.textContent = '重置中...';

            try {
                const resp = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });

                const data = await resp.json();

                if (resp.ok) {
                    document.getElementById('reset-form-container').style.display = 'none';
                    document.getElementById('success-container').style.display = 'block';
                } else {
                    if (data.detail && (data.detail.includes('expired') || data.detail.includes('invalid') || data.detail.includes('无效'))) {
                        document.getElementById('reset-form-container').style.display = 'none';
                        document.getElementById('invalid-token-container').style.display = 'block';
                    } else {
                        showMessage(data.detail || '重置失败，请重试', 'error');
                    }
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
            }

            btn.disabled = false;
            btn.textContent = '重置密码';
        }
    </script>
</body>

</html>
